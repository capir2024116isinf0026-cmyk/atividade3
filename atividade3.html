<!DOCTYPE html>
<html>
<head>
    <title>Verificação de idade</title>
</head>
<body>

    <input type="number" id="idade">
    
    <button onclick="
        if(document.getElementById('idade').value >= 18){
            alert('Maior de idade');
        } else {
            alert('Menor de idade');
        }
    ">
        Verificar
    </button>

</body>
</html>
